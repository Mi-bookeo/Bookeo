<title>Bookeo · Pronto disponible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%;
    background: #faf8f3;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    background: #faf8f3;
  }
  .foto {
    width: 100%;
    max-width: 600px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    margin-bottom: 36px;
  }
  .foto img {
    width: 100%;
    height: auto;
    display: block;
  }
  .texto {
    text-align: center;
    max-width: 500px;
  }
  .texto h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.1rem, 3vw, 1.5rem);
    color: #1a1a2e;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }
  .texto h1 strong {
    color: #7db898;
    font-weight: 700;
  }
  .punto {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 20px;
  }
  .punto span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #7db898;
    opacity: 0.4;
    animation: pulse 1.8s infinite;
  }
  .punto span:nth-child(2) { animation-delay: 0.3s; }
  .punto span:nth-child(3) { animation-delay: 0.6s; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
</style>
</head>
